<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLP Card Library</title>

  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0ff;--surface:#ffffff;--surface2:#ede8f8;--border:#d4c8f0;--border2:#b8a8e0;
  --text:#1e1040;--muted:#6b52a8;--dim:#a090c8;
  --purple:#7c3aed;--purple-l:#a78bfa;--pink:#db2777;--gold:#d97706;--green:#16a34a;
  --font-head:'Fredoka One',cursive;--font-body:'Nunito',sans-serif;--radius:10px;
}
body.dark-mode {
  --bg:#0f0820;--surface:#1a1035;--surface2:#231548;--border:#2d1f5e;--border2:#3d2a7a;
  --text:#e8e0ff;--muted:#9580c8;--dim:#5a4a8a;
  --purple:#7c3aed;--purple-l:#a78bfa;--pink:#ec4899;--gold:#fbbf24;--green:#4ade80;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);overflow:hidden;}

/* ── TOPBAR ── */
.topbar{height:44px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;z-index:20;}
.topbar-title{font-family:var(--font-head);font-size:1.1rem;color:var(--purple);flex:1;}
.hdr-btn{background:transparent;border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:0.7rem;color:var(--muted);cursor:pointer;font-family:var(--font-body);font-weight:700;}
.hdr-btn:hover{border-color:var(--purple);color:var(--purple);}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:calc(100vh - var(--nav-h,56px));height:calc(100dvh - var(--nav-h,56px));}
#main{display:flex;flex:1;overflow:hidden;}

/* ── LEFT PANEL (filters + grid) ── */
#lib-panel{width:320px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.lib-filters{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.lib-search{width:100%;padding:6px 10px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-family:var(--font-body);font-size:0.75rem;margin-bottom:6px;}
.lib-search:focus{outline:none;border-color:var(--purple);}
.lib-search:focus-visible{outline:2px solid var(--purple);outline-offset:2px;}
.skip-link:focus{left:1rem!important;}
.filter-row{display:flex;gap:5px;align-items:center;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.dd-wrap{position:relative;}
.dd-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:0.65rem;font-family:var(--font-body);font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;}
.dd-btn:hover{border-color:var(--purple);}
.dd-menu{display:none;position:fixed;z-index:1000;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:6px;min-width:110px;max-height:220px;overflow-y:auto;box-shadow:0 6px 20px rgba(0,0,0,.15);}
.dd-menu.open{display:block;}
.dd-item{display:flex;align-items:center;gap:6px;padding:3px 4px;border-radius:4px;cursor:pointer;font-size:0.68rem;color:var(--text);white-space:nowrap;}
.dd-item:hover{background:var(--surface2);}
.dd-item input{accent-color:var(--purple);width:12px;height:12px;cursor:pointer;}
.race-tab{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:0.6rem;cursor:pointer;color:var(--muted);flex:1;font-family:var(--font-body);font-weight:600;}
.race-tab.active{background:var(--purple);color:#fff;border-color:var(--purple);font-weight:700;text-decoration:underline;}
.sort-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:0.75rem;cursor:pointer;color:var(--muted);flex-shrink:0;}
.sort-btn:hover{border-color:var(--purple);}
.lib-count{font-size:0.62rem;color:var(--dim);padding:2px 0;}

/* ── CARD GRID ── */
.lib-scroll{flex:1;overflow-y:auto;padding:8px;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:6px;}
.card-tile{cursor:pointer;border-radius:6px;overflow:hidden;border:1.5px solid transparent;transition:border-color .15s,transform .1s;position:relative;}
.card-tile:hover{border-color:var(--purple-l);transform:translateY(-2px);}
.card-tile.selected{border-color:var(--purple);box-shadow:0 0 0 2px rgba(124,58,237,.3);}
.card-tile img{width:100%;display:block;aspect-ratio:5/7;object-fit:cover;}
.card-ph{aspect-ratio:5/7;display:flex;align-items:center;justify-content:center;background:var(--surface2);font-size:1.4rem;}
.in-deck-badge{position:absolute;top:3px;right:3px;background:rgba(124,58,237,.9);color:#fff;font-size:0.55rem;font-weight:800;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;}

/* ── DETAIL PANEL ── */
#detail-panel{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--dim);gap:8px;}
.detail-empty .ei{font-size:2.5rem;}
.detail-card{display:flex;gap:14px;align-items:flex-start;}
.detail-img{width:120px;flex-shrink:0;border-radius:8px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.detail-img img{width:100%;display:block;}
.detail-img .card-ph{height:168px;font-size:2.5rem;}
.detail-info{flex:1;min-width:0;}
.detail-name{font-family:var(--font-head);font-size:1.15rem;color:var(--text);line-height:1.1;margin-bottom:4px;}
.detail-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.meta-pill{font-size:0.65rem;padding:2px 8px;border-radius:20px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.meta-pill.rarity{color:var(--gold);border-color:rgba(217,119,6,.3);}
.meta-pill.type{color:var(--purple-l);border-color:rgba(167,139,250,.3);}
.detail-stats{display:flex;gap:8px;margin-bottom:8px;}
.stat-box{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;text-align:center;min-width:44px;}
.stat-box .sv{font-size:1rem;font-weight:800;color:var(--text);}
.stat-box .sl{font-size:0.55rem;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;}
.detail-subtypes{font-size:0.68rem;color:var(--muted);margin-bottom:8px;}
.detail-ability{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:0.72rem;line-height:1.6;color:var(--text);}
.detail-ability .ability-label{font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:4px;}
.lang-toggle{display:flex;gap:4px;margin-bottom:8px;align-items:center;}
.lang-btn{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:0.6rem;cursor:pointer;color:var(--muted);font-family:var(--font-body);}
.lang-btn.active{background:var(--purple);color:#fff;border-color:var(--purple);font-weight:700;}
.fs-btn{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:0.6rem;cursor:pointer;color:var(--muted);font-family:var(--font-body);line-height:1.4;}
.lang-sep{width:1px;height:14px;background:var(--border);margin:0 2px;}
.related-section{border-top:1px solid var(--border);padding-top:12px;}
.related-title{font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:8px;}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:5px;}
.rel-card{cursor:pointer;border-radius:5px;overflow:hidden;border:1.5px solid transparent;transition:border-color .12s;position:relative;}
.rel-card:hover{border-color:var(--purple-l);}
.rel-card img{width:100%;display:block;aspect-ratio:5/7;object-fit:cover;}
.rel-card .card-ph{aspect-ratio:5/7;font-size:1rem;}

/* ── MOBILE ── */
@media(max-width:768px){
  #lib-panel{width:100%;border-right:none;}
  #detail-panel{display:none;}
  .mo-overlay{display:flex;position:fixed;top:var(--nav-h,56px);left:0;right:0;bottom:0;z-index:900;background:rgba(0,0,0,.6);align-items:flex-end;}
  .mo-sheet{
    background:var(--surface);border-radius:16px 16px 0 0;width:100%;
    max-height:calc(100vh - var(--nav-h,56px));
    max-height:calc(100dvh - var(--nav-h,56px));
    display:flex;flex-direction:column;overflow:hidden;
  }
  .mo-sheet-header{
    position:relative;display:flex;align-items:center;justify-content:flex-end;
    padding:20px 16px 12px;flex-shrink:0;
    border-bottom:1px solid var(--border);
  }
  /* drag handle pill */
  .mo-sheet-header::before{
    content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);
    width:40px;height:4px;background:var(--border2);border-radius:2px;
  }
  .mo-close{
    background:var(--surface2);border:1.5px solid var(--border2);border-radius:50%;
    width:34px;height:34px;font-size:1rem;font-weight:700;
    cursor:pointer;color:var(--text);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    line-height:1;
  }
  .mo-close:active{background:var(--border2);}
  #mo-content{flex:1;overflow-y:auto;padding:14px 16px 24px;}
}
@media(min-width:769px){
  .mo-overlay{display:none!important;}
}
/* Inside bottom sheet: shrink image so content has more room */
@media(max-width:480px){
  #mo-content .detail-card{gap:10px;}
  #mo-content .detail-img{width:90px;}
  #mo-content .detail-img .card-ph{height:126px;}
}

/* ── Proxy Mode watermark & badge ── */
.proxy-card{position:relative;}
.proxy-card::after{
  content:'PROXY';
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;
  font-size:1.6rem;font-weight:900;
  color:rgba(220,38,38,0.55);
  transform:rotate(-30deg);
  pointer-events:none;
  text-shadow:0 1px 4px rgba(0,0,0,0.3);
  letter-spacing:0.05em;
}
.proxy-badge{
  display:inline-flex;align-items:center;gap:3px;
  background:rgba(168,85,247,0.15);color:#9333ea;
  border:1px solid rgba(168,85,247,0.4);
  border-radius:20px;padding:2px 8px;
  font-size:0.6rem;font-weight:800;
}
</style>
<!-- i18n translations (must load before nav.js) -->
<script src="../i18n/translations.js"></script>
<!-- Shared navigation bar (handles dark/light theme toggle) -->
<script src="../nav.js"></script>
<script>
// Bridge nav.js html.dark → body.dark-mode for this page's existing CSS
(function(){
  function syncDark(dark){ document.body.classList.toggle('dark-mode', dark); }
  document.addEventListener('DOMContentLoaded', function(){
    syncDark(document.documentElement.classList.contains('dark'));
  });
  window.addEventListener('mlp-theme-change', function(e){ syncDark(e.detail.dark); });
})();
</script>

<body>
<a href="#main" class="skip-link" style="position:absolute;left:-9999px;top:1rem;z-index:10000;background:#5b21b6;color:#fff;padding:6px 14px;border-radius:6px;font-weight:700;text-decoration:none">Skip to content</a>
<div id="app">
  <div class="topbar">
    <span class="topbar-title">📚 MLP Card Library</span>
    <span id="lib-count-lbl" style="font-size:0.65rem;color:var(--dim);"></span>
  </div>
  <main id="main">
    <!-- LEFT: filters + grid -->
    <div id="lib-panel">
      <div class="lib-filters">
        <input class="lib-search" id="lib-search" placeholder="Search cards..." oninput="_debouncedRenderGrid()" data-i18n-ph="common.search">
        <div class="filter-row">
          <div class="dd-wrap">
            <button class="dd-btn" id="lib-filter-type-btn" onclick="toggleDD('dd-type')">Type <span style="font-size:0.5rem">▼</span></button>
            <div class="dd-menu" id="dd-type">
              <label class="dd-item"><input type="checkbox" value="Character"      onchange="renderGrid()"> Character</label>
              <label class="dd-item"><input type="checkbox" value="Event"          onchange="renderGrid()"> Event</label>
              <label class="dd-item"><input type="checkbox" value="Item"           onchange="renderGrid()"> Item</label>
              <label class="dd-item"><input type="checkbox" value="Scene"          onchange="renderGrid()"> Scene</label>
              <label class="dd-item"><input type="checkbox" value="Main Character" onchange="renderGrid()"> Main Char</label>
              <label class="dd-item"><input type="checkbox" value="Story"          onchange="renderGrid()"> Story</label>
            </div>
          </div>
          <div class="dd-wrap">
            <button class="dd-btn" id="lib-filter-rarity-btn" onclick="toggleDD('dd-rarity')">Rarity <span style="font-size:0.5rem">▼</span></button>
            <div class="dd-menu" id="dd-rarity">
              <label class="dd-item"><input type="checkbox" value="CR"   onchange="renderGrid()"> CR</label>
              <label class="dd-item"><input type="checkbox" value="GR"   onchange="renderGrid()"> GR</label>
              <label class="dd-item"><input type="checkbox" value="SR"   onchange="renderGrid()"> SR</label>
              <label class="dd-item"><input type="checkbox" value="RR"   onchange="renderGrid()"> RR</label>
              <label class="dd-item"><input type="checkbox" value="U"    onchange="renderGrid()"> U</label>
              <label class="dd-item"><input type="checkbox" value="C"    onchange="renderGrid()"> C</label>
              <label class="dd-item"><input type="checkbox" value="ER"   onchange="renderGrid()"> ER</label>
              <label class="dd-item"><input type="checkbox" value="SPR"  onchange="renderGrid()"> SPR</label>
            </div>
          </div>
          <div class="dd-wrap">
            <button class="dd-btn" id="lib-filter-set-btn" onclick="toggleDD('dd-set')">Set <span style="font-size:0.5rem">▼</span></button>
            <div class="dd-menu" id="dd-set"></div>
          </div>
          <div class="dd-wrap">
            <button class="dd-btn" id="lib-filter-race-btn" onclick="toggleDD('dd-race')">Race <span style="font-size:0.5rem">▼</span></button>
            <div class="dd-menu" id="dd-race" style="min-width:120px;">
              <div style="display:flex;gap:3px;margin-bottom:5px;">
                <button class="race-tab active" id="race-tab-pony" onclick="setRaceTab('pony')">🐴 Pony</button>
                <button class="race-tab" id="race-tab-pet" onclick="setRaceTab('pet')">🐾 Pet</button>
              </div>
              <div id="race-pony">
                <label class="dd-item"><input type="checkbox" value="Unicorn"    onchange="renderGrid()"> Unicorn</label>
                <label class="dd-item"><input type="checkbox" value="Pegasus"    onchange="renderGrid()"> Pegasus</label>
                <label class="dd-item"><input type="checkbox" value="Earth Pony" onchange="renderGrid()"> Earth Pony</label>
                <label class="dd-item"><input type="checkbox" value="Alicorn"    onchange="renderGrid()"> Alicorn</label>
                <label class="dd-item"><input type="checkbox" value="Race:Other" onchange="renderGrid()"> Other</label>
              </div>
              <div id="race-pet" style="display:none">
                <label class="dd-item"><input type="checkbox" value="Dragon"     onchange="renderGrid()"> Dragon</label>
                <label class="dd-item"><input type="checkbox" value="Crocodile"  onchange="renderGrid()"> Crocodile</label>
                <label class="dd-item"><input type="checkbox" value="Turtle"     onchange="renderGrid()"> Turtle</label>
                <label class="dd-item"><input type="checkbox" value="Rabbit"     onchange="renderGrid()"> Rabbit</label>
                <label class="dd-item"><input type="checkbox" value="Dog"        onchange="renderGrid()"> Dog</label>
                <label class="dd-item"><input type="checkbox" value="Cat"        onchange="renderGrid()"> Cat</label>
                <label class="dd-item"><input type="checkbox" value="Owl"        onchange="renderGrid()"> Owl</label>
                <label class="dd-item"><input type="checkbox" value="Phoenix"    onchange="renderGrid()"> Phoenix</label>
                <label class="dd-item"><input type="checkbox" value="Pet:Other"  onchange="renderGrid()"> Other</label>
              </div>
            </div>
          </div>
          <button class="sort-btn" id="lib-sort-btn" onclick="toggleSortLib()" title="Toggle sort order" data-i18n="lib.sortDesc">↓ Sort</button>
          <button class="sort-btn" id="lib-alt-btn" onclick="toggleAltLib()" title="Toggle alt art" data-i18n="lib.altAll">All ※</button>
          <button class="sort-btn" onclick="clearFilters()" title="Clear filters">✕</button>
        </div>
      </div>
      <div class="lib-scroll">
        <div class="card-grid" id="card-grid"></div>
      </div>
    </div>

    <!-- RIGHT: detail panel (desktop only) -->
    <div id="detail-panel">
      <div class="detail-empty" id="detail-empty">
        <div class="ei">🃏</div>
        <p id="detail-empty-txt" style="font-size:0.8rem;color:var(--dim);">Click a card to see details</p>
      </div>
      <div id="detail-content" style="display:none;"></div>
    </div>
  </main>
</div>

<!-- Mobile bottom sheet -->
<div class="mo-overlay" id="mo-overlay" style="display:none" onclick="closeMoSheet(event)">
  <div class="mo-sheet" id="mo-sheet" onclick="event.stopPropagation()">
    <div class="mo-sheet-header">
      <button class="mo-close" onclick="closeMoSheet()">✕</button>
    </div>
    <div id="mo-content"></div>
  </div>
</div>

<script>
const PONY_RACES = ['Unicorn','Pegasus','Earth Pony','Alicorn'];
const PET_RACES  = ['Dragon','Crocodile','Turtle','Rabbit','Dog','Cat','Owl','Phoenix'];
const BASE_URLS  = [
  '..',
  'https://raw.githubusercontent.com/auac131/MLP-DB/main',
  'https://raw.githubusercontent.com/auac131/MLP-DB/master',
];

// ── i18n — delegates to centralized /i18n/translations.js via window.i18n ──
function _lt(key){ return (window.i18n && window.i18n.t(key)) || key; }

let _library = [];
let _selected = null;
let _renderDebounceTimer = null;
function _debouncedRenderGrid() { clearTimeout(_renderDebounceTimer); _renderDebounceTimer = setTimeout(renderGrid, 250); }
let _officialSets = new Set();
let _proxyMode = localStorage.getItem('mlp-proxy-mode') === 'true';
function isProxy(card){ return _officialSets.size > 0 && !_officialSets.has(card.deck); }
let _lang = (window.i18n && window.i18n.lang) || 'en'; // 'en' | 'th' — synced with global i18n
const FS_DEFAULT = 0.72; // rem
const FS_STEP = 0.06;
const FS_MIN = 0.54;
const FS_MAX = 1.1;
let _abilFontSize = parseFloat(localStorage.getItem('abil_fs') || FS_DEFAULT);
let _sortAsc = false;
let _altMode = 'all'; // 'all' | 'no-alt' | 'alt-only'
const COLOR_MAP = {Purple:'#a78bfa',Pink:'#f472b6',Yellow:'#fbbf24',Orange:'#fb923c',Blue:'#60a5fa',White:'#e2e8f0'};

function getChecked(id){return Array.from(document.querySelectorAll(`#${id} input:checked`)).map(e=>e.value);}
function toggleDD(id){
  const wasOpen = document.getElementById(id)?.classList.contains('open');
  document.querySelectorAll('.dd-menu.open').forEach(m=>m.classList.remove('open'));
  if(wasOpen) return;
  const menu = document.getElementById(id);
  if(!menu) return;
  const btn = menu.previousElementSibling;
  const rect = btn.getBoundingClientRect();
  menu.style.top  = (rect.bottom + 4) + 'px';
  menu.style.left = rect.left + 'px';
  menu.classList.add('open');
}
document.addEventListener('click',e=>{if(!e.target.closest('.dd-wrap'))document.querySelectorAll('.dd-menu.open').forEach(m=>m.classList.remove('open'));});

function setRaceTab(tab){
  document.getElementById('race-pony').style.display = tab==='pony' ? '' : 'none';
  document.getElementById('race-pet').style.display  = tab==='pet'  ? '' : 'none';
  document.getElementById('race-tab-pony').classList.toggle('active', tab==='pony');
  document.getElementById('race-tab-pet').classList.toggle('active', tab==='pet');
}

function clearFilters(){
  document.querySelectorAll('.dd-menu input[type=checkbox]').forEach(cb=>cb.checked=false);
  document.getElementById('lib-search').value='';
  _altMode='all';
  const altBtn=document.getElementById('lib-alt-btn');
  if(altBtn) altBtn.textContent=_lt('lib.altAll');
  renderGrid();
}

const RARITY_RANK = {
  'CR':0,'GR':1,'SR':2,'U':3,'C':4,'RR':5,'ER':6,'SPR':7,
  '※CR':8,'※GR':9,'※SR':10,'※RR':11,'※ER':12,'※SPR':13,
};
const ALT_RARITIES_SET = new Set(['※CR','※GR','※SR','※RR','※ER','※SPR']);

function getDeckCode(card){ return card.deck || (card.id||'').split('-')[0] || ''; }
function getCardNum(id){ const m=(id||'').match(/([A-Z]+)(\d+)$/i); return m?parseInt(m[2]):0; }

function sortCards(cards){
  return [...cards].sort((a,b)=>{
    const dc = getDeckCode(a).localeCompare(getDeckCode(b));
    if(dc!==0) return _sortAsc ? -dc : dc;
    const ra=RARITY_RANK[a.rarity]??99, rb=RARITY_RANK[b.rarity]??99;
    const rd = _sortAsc ? rb-ra : ra-rb;
    if(rd!==0) return rd;
    const diff = getCardNum(a.id)-getCardNum(b.id);
    return _sortAsc ? -diff : diff;
  });
}

function toggleSortLib(){
  _sortAsc = !_sortAsc;
  const btn = document.getElementById('lib-sort-btn');
  if(btn) btn.textContent = _sortAsc ? _lt('lib.sortAsc') : _lt('lib.sortDesc');
  renderGrid();
}

function toggleAltLib(){
  const cycle = {all:'no-alt','no-alt':'alt-only','alt-only':'all'};
  _altMode = cycle[_altMode];
  const altKeys = {all:'lib.altAll','no-alt':'lib.altNo','alt-only':'lib.altOnly'};
  const btn = document.getElementById('lib-alt-btn');
  if(btn) btn.textContent = _lt(altKeys[_altMode]);
  renderGrid();
}

function renderGrid(){
  const search   = document.getElementById('lib-search').value.toLowerCase();
  const types    = getChecked('dd-type');
  const rarities = getChecked('dd-rarity');
  const sets     = getChecked('dd-set');
  const raceVals = getChecked('dd-race');

  let cards = _library;
  if(!_proxyMode) cards = cards.filter(c=>!isProxy(c));
  if(types.length)    cards = cards.filter(c=>types.includes(c.type));
  if(rarities.length) cards = cards.filter(c=>rarities.includes(c.rarity));
  if(sets.length)     cards = cards.filter(c=>sets.includes(c.deck));
  if(raceVals.length) cards = cards.filter(c=>{
    const subs = c.subtype||[];
    return raceVals.some(v=>{
      if(v==='Race:Other') return (c.type==='Character'||c.type==='Main Character')&&!PONY_RACES.some(r=>subs.includes(r));
      if(v==='Pet:Other')  return subs.includes('Pet')&&!PET_RACES.some(r=>subs.includes(r));
      return subs.includes(v);
    });
  });
  if(search) cards = cards.filter(c=>
    c.name.toLowerCase().includes(search)||
    c.id.toLowerCase().includes(search)||
    (c.subtype||[]).some(s=>s.toLowerCase().includes(search))
  );
  // Alt art filter
  if(_altMode==='no-alt')   cards = cards.filter(c=>!ALT_RARITIES_SET.has(c.rarity));
  if(_altMode==='alt-only') cards = cards.filter(c=>ALT_RARITIES_SET.has(c.rarity));

  cards = sortCards(cards);

  document.getElementById('lib-count-lbl').textContent = `${cards.length} ${_lt('lib.cards')}`;

  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  if(!cards.length){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--dim);font-size:0.75rem;">🔍 ${_lt('lib.noCards')}</div>`;
    return;
  }
  cards.forEach(card=>{
    const el = document.createElement('div');
    el.className = 'card-tile' + (_selected?.id===card.id?' selected':'') + (isProxy(card)?' proxy-card':'');
    el.onclick = ()=>selectCard(card);
    el.innerHTML=`<img src="${card.imageUrl}" alt="${card.name}" loading="lazy" onerror="this.onerror=null;this.src='../cards/back_main.webp'">`;
    grid.appendChild(el);
  });
}

function typeIcon(t){return{Character:'👤',Event:'✨',Item:'🎀',Scene:'🎭','Main Character':'⭐',Story:'📖'}[t]||'🃏';}

function selectCard(card){
  _selected = card;
  // Highlight in grid
  document.querySelectorAll('.card-tile').forEach(el=>el.classList.remove('selected'));
  event?.currentTarget?.classList.add('selected');

  const html = buildDetailHTML(card);
  const isMobile = window.innerWidth <= 768;
  if(isMobile){
    document.getElementById('mo-content').innerHTML = html;
    const _ms = document.getElementById('mo-sheet');
    if(_ms){ _ms.style.transform=''; _ms.style.transition=''; }
    document.getElementById('mo-overlay').style.display = 'flex';
  } else {
    document.getElementById('detail-empty').style.display = 'none';
    const dc = document.getElementById('detail-content');
    dc.style.display = '';
    dc.innerHTML = html;
  }
  _applyAbilFontSize();
}

function buildDetailHTML(card){
  const colorHex = COLOR_MAP[card.color]||'var(--muted)';
  const imgHTML = `<img src="${card.imageUrl}" alt="${card.name}" onerror="this.onerror=null;this.src='../cards/back_main.webp'">`;
  const proxyBadge = isProxy(card) ? `<span class="proxy-badge">🔮 Not Official Release</span>` : '';

  const hasCost  = card.cost  != null;
  const hasPower = card.power != null;
  const statsHTML = (hasCost||hasPower) ? `
    <div class="detail-stats">
      ${hasCost  ?`<div class="stat-box"><div class="sv">${card.cost}</div><div class="sl">Cost</div></div>`:''}
      ${hasPower ?`<div class="stat-box"><div class="sv">${card.power}</div><div class="sl">Power</div></div>`:''}
    </div>` : '';

  const subs = (card.subtype||[]).join(' · ');
  const subsHTML = subs ? `<div class="detail-subtypes">${subs}</div>` : '';

  const abilEN = card.ability||'';
  const abilTH = card.ability_th||'';
  const hasAbil = abilEN||abilTH;
  const abilHTML = hasAbil ? `
    <div>
      <div class="lang-toggle">
        <button class="lang-btn active" id="lb-en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" id="lb-th" onclick="setLang('th')">TH</button>
        <span class="lang-sep"></span>
        <button class="fs-btn" onclick="setAbilFontSize(-1)" title="Smaller">A−</button>
        <button class="fs-btn" onclick="setAbilFontSize(1)" title="Larger">A+</button>
        <button class="fs-btn" onclick="setAbilFontSize(0)" title="Reset">↺</button>
      </div>
      <div class="detail-ability" id="detail-ability-box">
        <div id="abil-en">${abilEN||'—'}</div>
        <div id="abil-th" style="display:none">${abilTH||'—'}</div>
      </div>
    </div>` : '';

  // Related cards
  const relHTML = buildRelatedHTML(card);

  return `
    <div class="detail-card">
      <div class="detail-img${isProxy(card)?' proxy-card':''}">${imgHTML}</div>
      <div class="detail-info">
        <div class="detail-name">${card.name}${proxyBadge?' '+proxyBadge:''}</div>
        <div class="detail-meta">
          <span class="meta-pill type">${card.type}</span>
          <span class="meta-pill rarity">${card.rarity}</span>
          ${card.color?`<span class="meta-pill" style="color:${colorHex};border-color:${colorHex}44">${card.color}</span>`:''}
          ${card.deck?`<span class="meta-pill">${card.deck}</span>`:''}
        </div>
        ${statsHTML}
        ${subsHTML}
      </div>
    </div>
    ${abilHTML}
    ${relHTML}`;
}

function buildRelatedHTML(card){
  const subs = card.subtype||[];
  let sections = [];

  // 0. Alt art — same base ID (strip leading ※)
  const baseId = card.id.replace(/^※/, '');
  const altArts = _library.filter(c =>
    c.id !== card.id && c.id.replace(/^※/, '') === baseId
  );
  if(altArts.length) sections.push({title:'🌟 Alt Art',cards:altArts});

  // 1. Character name — subtypes that are not race/pet keywords
  const charNames = subs.filter(s=>!PONY_RACES.includes(s)&&!PET_RACES.includes(s)&&s!=='Pet'&&s!=='Everyday');
  charNames.forEach(name=>{
    const rel = _library.filter(c=>c.id!==card.id&&(c.subtype||[]).includes(name));
    if(rel.length) sections.push({title:`✨ ${name}`,cards:rel});
  });

  // 2. Cards that mention this card's name in their effect text
  if(card.name){
    const mentioned = _library.filter(c =>
      c.id !== card.id &&
      ((c.ability||'').includes(card.name) || (c.ability_th||'').includes(card.name))
    );
    if(mentioned.length) sections.push({title:`📖 Related to "${card.name}"`,cards:mentioned});
  }

  if(!sections.length) return '';
  return sections.map(sec=>`
    <div class="related-section">
      <div class="related-title">${sec.title}</div>
      <div class="related-grid">
        ${sec.cards.map(c=>`
          <div class="rel-card${isProxy(c)?' proxy-card':''}" onclick="selectCard(${JSON.stringify(c).replace(/</g,'\\u003c').replace(/"/g,'&quot;')})">
            <img src="${c.imageUrl}" alt="${c.name}" loading="lazy" onerror="this.onerror=null;this.src='../cards/back_main.webp'">
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function _applyAbilFontSize(){
  const box = document.getElementById('detail-ability-box');
  if(box) box.style.fontSize = _abilFontSize + 'rem';
}

function setAbilFontSize(delta){
  if(delta === 0){
    _abilFontSize = FS_DEFAULT;
  } else {
    _abilFontSize = Math.min(FS_MAX, Math.max(FS_MIN, _abilFontSize + delta * FS_STEP));
  }
  _abilFontSize = Math.round(_abilFontSize * 1000) / 1000;
  localStorage.setItem('abil_fs', _abilFontSize);
  _applyAbilFontSize();
}

function setLang(lang){
  _lang = lang;
  const enEl = document.getElementById('abil-en');
  const thEl = document.getElementById('abil-th');
  const lbEn = document.getElementById('lb-en');
  const lbTh = document.getElementById('lb-th');
  if(enEl) enEl.style.display = lang==='en' ? '' : 'none';
  if(thEl) thEl.style.display = lang==='th' ? '' : 'none';
  if(lbEn) lbEn.classList.toggle('active', lang==='en');
  if(lbTh) lbTh.classList.toggle('active', lang==='th');
}

function closeMoSheet(e){
  if(!e||e.target===document.getElementById('mo-overlay'))
    document.getElementById('mo-overlay').style.display='none';
}

// Swipe DOWN on sheet header → close bottom sheet
(function(){
  const sheet  = document.getElementById('mo-sheet');
  const header = document.querySelector('.mo-sheet-header');
  if(!sheet || !header) return;
  let _sy=0, _dy=0;
  header.addEventListener('touchstart', e=>{
    _sy=e.touches[0].clientY; _dy=0;
    sheet.style.transition='none';
  },{passive:true});
  header.addEventListener('touchmove', e=>{
    const d = e.touches[0].clientY - _sy;
    if(d>0){ _dy=d; sheet.style.transform=`translateY(${d}px)`; }
  },{passive:true});
  header.addEventListener('touchend', ()=>{
    sheet.style.transition='transform 0.25s ease';
    if(_dy>110){
      sheet.style.transform='translateY(100%)';
      setTimeout(()=>{
        document.getElementById('mo-overlay').style.display='none';
        sheet.style.transform=''; sheet.style.transition='';
      },230);
    } else {
      sheet.style.transform='';
      setTimeout(()=>{ sheet.style.transition=''; },260);
    }
  },{passive:true});
})();

// Theme handled by nav.js

function buildSetDropdown(){
  const sets = [...new Set(_library.map(c=>c.deck).filter(Boolean))].sort();
  const el = document.getElementById('dd-set');
  el.innerHTML = sets.map(s=>`<label class="dd-item"><input type="checkbox" value="${s}" onchange="renderGrid()"> ${s}</label>`).join('');
}

async function loadCards(){
  const grid = document.getElementById('card-grid');
  grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--dim);font-size:0.75rem;">⏳ ${_lt('lib.loading')}</div>`;
  for(const base of BASE_URLS){
    try{
      const [cfgRes, cardsRes] = await Promise.all([
        fetch('../sets_config.json').catch(()=>null),
        fetch(base+'/MLP-DB.json')
      ]);
      if(cfgRes && cfgRes.ok){
        const cfg = await cfgRes.json().catch(()=>null);
        if(cfg && cfg.officialSets) _officialSets = new Set(cfg.officialSets);
      }
      if(!cardsRes.ok) continue;
      const data = await cardsRes.json();
      const raw = Array.isArray(data) ? data : (data.cards||[]);
      _library = raw.map((c,i)=>({
        id:c.id||`c${i}`, name:c.name||'?', type:c.type||'Character',
        subtype:c.subtype||[], color:c.color||'', cost:c.cost??null, power:c.power??null,
        rarity:c.rarity||'C', deck:c.deck||(c.id||'').split('-')[0]||'',
        ability:c.ability||'', ability_th:c.ability_th||'',
        imageUrl: base+'/cards/'+c.id+'.webp',
      }));
      buildSetDropdown();
      renderGrid();
      return;
    }catch(e){console.warn('Load failed:',e.message);}
  }
  grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--dim);font-size:0.75rem;">⚠ Could not load cards</div>';
}

function _renderLibI18n(){
  // Topbar title
  const ttl = document.querySelector('.topbar-title');
  if(ttl) ttl.textContent = _lt('lib.topbarTitle');
  // Search placeholder
  const srch = document.getElementById('lib-search');
  if(srch) srch.placeholder = _lt('common.search');
  // Filter buttons
  const fbMap = {'lib-filter-type-btn':'common.filterType','lib-filter-rarity-btn':'common.filterRarity','lib-filter-set-btn':'common.filterSet','lib-filter-race-btn':'common.filterRace'};
  Object.entries(fbMap).forEach(([id,key])=>{
    const btn=document.getElementById(id);
    if(btn) btn.innerHTML=_lt(key)+' <span style="font-size:0.5rem">▼</span>';
  });
  // Sort / alt buttons (reflect current state)
  const sortBtn=document.getElementById('lib-sort-btn');
  if(sortBtn) sortBtn.textContent=_sortAsc?_lt('lib.sortAsc'):_lt('lib.sortDesc');
  const altKeys={all:'lib.altAll','no-alt':'lib.altNo','alt-only':'lib.altOnly'};
  const altBtn=document.getElementById('lib-alt-btn');
  if(altBtn) altBtn.textContent=_lt(altKeys[_altMode]||'lib.altAll');
  // Detail empty state
  const det=document.getElementById('detail-empty-txt');
  if(det) det.textContent=_lt('lib.clickDetail');
  // Re-render grid to refresh count/empty-state strings
  if(_library.length) renderGrid();
}

function _onLangChange(){
  if(window.i18n){ _lang=window.i18n.lang; if(_selected) setLang(_lang); }
  _renderLibI18n();
}

document.addEventListener('DOMContentLoaded', function(){
  if(window.i18n) _lang=window.i18n.lang;
  _renderLibI18n();
});
window.addEventListener('mlp-lang-change', _onLangChange);
window.addEventListener('mlp-proxy-change', function(e){
  _proxyMode = e.detail.proxyMode;
  renderGrid();
  if(_selected){ const dc=document.getElementById('detail-content'); if(dc&&dc.style.display!=='none') dc.innerHTML=buildDetailHTML(_selected); }
});

loadCards();
</script>
